<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Burpee Timer">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Burpee Timer</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <style>
    :root{
      --bg1:#020617;
      --bg2:#111827;
      --panel:rgba(15,23,42,.78);
      --border:rgba(148,163,184,.18);
      --text:#e5edf9;
      --muted:#94a3b8;
      --phase:#60a5fa;
      --accent:#22d3ee;
      --ring:0deg;
      --safe-top: max(env(safe-area-inset-top), 14px);
      --safe-bottom: max(env(safe-area-inset-bottom), 14px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;margin:0;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(34,211,238,.15), transparent 38%),
        radial-gradient(circle at bottom, rgba(59,130,246,.12), transparent 30%),
        linear-gradient(160deg,var(--bg1),var(--bg2));
      min-height:100%;
      padding:var(--safe-top) 16px var(--safe-bottom);
      touch-action:manipulation;
    }
    body.phase-prepare{ --phase:#f59e0b; --accent:#fbbf24; }
    body.phase-work{ --phase:#22c55e; --accent:#4ade80; }
    body.phase-rest{ --phase:#38bdf8; --accent:#60a5fa; }
    body.phase-done{ --phase:#a78bfa; --accent:#c4b5fd; }
    .app{
      max-width:540px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:calc(100dvh - var(--safe-top) - var(--safe-bottom));
    }
    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:0 20px 45px rgba(2,6,23,.42);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .hero{
      padding:18px 18px 22px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }
    .title{
      font-size:20px;
      font-weight:800;
      letter-spacing:.02em;
      margin:0;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(148,163,184,.1);
      border:1px solid rgba(148,163,184,.14);
      font-size:13px;
      color:#dbeafe;
      white-space:nowrap;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--phase);
      box-shadow:0 0 14px var(--phase);
      flex:none;
    }
    .ring-wrap{
      position:relative;
      width:min(72vw, 320px);
      aspect-ratio:1;
      margin:12px auto 16px;
    }
    .ring{
      width:100%;height:100%;
      border-radius:50%;
      display:grid;place-items:center;
      background:
        radial-gradient(circle at center, rgba(2,6,23,.95) 0 58%, transparent 59%),
        conic-gradient(var(--phase) 0deg, var(--phase) var(--ring), rgba(148,163,184,.16) var(--ring) 360deg);
      box-shadow:
        0 0 0 14px rgba(255,255,255,.02) inset,
        0 0 34px rgba(34,211,238,.08),
        0 16px 40px rgba(2,6,23,.48);
    }
    .time{
      display:flex;
      flex-direction:column;
      align-items:center;
      line-height:1;
    }
    .time strong{
      font-size:clamp(64px, 18vw, 92px);
      font-weight:900;
      letter-spacing:.03em;
    }
    .time span{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }
    .stat{
      padding:12px;
      border-radius:18px;
      background:rgba(15,23,42,.45);
      border:1px solid rgba(148,163,184,.12);
    }
    .stat .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .stat .value{
      font-size:19px;
      font-weight:800;
    }
    .settings{
      padding:16px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }
    label.field{
      display:flex;
      flex-direction:column;
      gap:8px;
      font-size:13px;
      color:#d7e6fb;
      font-weight:700;
    }
    input[type=number]{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:14px 14px;
      background:rgba(2,6,23,.58);
      border:1px solid rgba(148,163,184,.14);
      color:var(--text);
      font-size:18px;
      font-weight:800;
      appearance:textfield;
      -moz-appearance:textfield;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button{
      -webkit-appearance:none;
      margin:0;
    }
    .controls{
      display:grid;
      grid-template-columns:1.2fr .9fr .9fr;
      gap:10px;
      padding:0 2px;
    }
    button{
      border:none;
      border-radius:18px;
      padding:16px 14px;
      font-size:17px;
      font-weight:900;
      cursor:pointer;
      color:#f8fbff;
      min-height:56px;
      touch-action:manipulation;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--phase),var(--accent));
      box-shadow:0 14px 26px rgba(34,211,238,.18);
    }
    .btn-secondary{
      background:rgba(30,41,59,.9);
      border:1px solid rgba(148,163,184,.16);
    }
    .hint{
      padding:14px 16px;
      font-size:13px;
      line-height:1.45;
      color:#d9e4f4;
    }
    .hint strong{color:#ffffff;}
    .tiny{
      font-size:12px;
      color:var(--muted);
      text-align:center;
      padding-bottom:2px;
    }
    @media (max-width:420px){
      .settings{grid-template-columns:1fr 1fr;}
      .controls{grid-template-columns:1fr; }
    }
  </style>
</head>
<body class="phase-prepare">
  <main class="app">
    <section class="card hero">
      <div class="topbar">
        <h1 class="title">Burpee Timer</h1>
        <div class="badge"><span class="dot"></span><span id="phaseLabel">準備中</span></div>
      </div>

      <div class="ring-wrap">
        <div class="ring" id="ring">
          <div class="time">
            <strong id="timeDisplay">10</strong>
            <span id="subLabel">READY</span>
          </div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">セット</div>
          <div class="value" id="setDisplay">0 / 0</div>
        </div>
        <div class="stat">
          <div class="label">次</div>
          <div class="value" id="nextDisplay">運動</div>
        </div>
        <div class="stat">
          <div class="label">状態</div>
          <div class="value" id="statusDisplay">待機</div>
        </div>
      </div>
    </section>

    <section class="card settings">
      <label class="field">準備（秒）
        <input id="prepareInput" type="number" min="0" max="600" step="1" value="10" inputmode="numeric">
      </label>
      <label class="field">運動（秒）
        <input id="workInput" type="number" min="1" max="3600" step="1" value="20" inputmode="numeric">
      </label>
      <label class="field">休憩（秒）
        <input id="restInput" type="number" min="0" max="3600" step="1" value="10" inputmode="numeric">
      </label>
      <label class="field">セット数
        <input id="setsInput" type="number" min="1" max="200" step="1" value="8" inputmode="numeric">
      </label>

      <div class="controls" style="grid-column:1 / -1;">
        <button id="startBtn" type="button" class="btn-primary">開始</button>
        <button id="pauseBtn" type="button" class="btn-secondary">一時停止</button>
        <button id="resetBtn" type="button" class="btn-secondary">リセット</button>
      </div>
    </section>

    <section class="card hint" id="installHint">
      <strong>iPhoneでホーム画面に追加：</strong> Safariで開いて、共有ボタン →「ホーム画面に追加」。<br>
      そのまま開くだけでも使えるけど、<strong>オフライン対応</strong>は HTTPS または localhost で配信したときに有効になる。
    </section>

    <div class="tiny" id="swStatus">Webアプリを準備中…</div>
  </main>

  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const els = {
        prepareInput: $('prepareInput'),
        workInput: $('workInput'),
        restInput: $('restInput'),
        setsInput: $('setsInput'),
        phaseLabel: $('phaseLabel'),
        timeDisplay: $('timeDisplay'),
        subLabel: $('subLabel'),
        setDisplay: $('setDisplay'),
        nextDisplay: $('nextDisplay'),
        statusDisplay: $('statusDisplay'),
        ring: $('ring'),
        startBtn: $('startBtn'),
        pauseBtn: $('pauseBtn'),
        resetBtn: $('resetBtn'),
        installHint: $('installHint'),
        swStatus: $('swStatus')
      };

      const state = {
        timerId: null,
        endAt: 0,
        remainingMs: 0,
        currentDurationMs: 0,
        currentPhase: 'prepare',
        setIndex: 0,
        totalSets: 0,
        status: 'idle',
        audioContext: null,
        audioUnlocked: false
      };

      const phaseMeta = {
        prepare: { label: '準備中', short: 'READY', body: 'phase-prepare' },
        work: { label: '運動', short: 'WORK', body: 'phase-work' },
        rest: { label: '休憩', short: 'REST', body: 'phase-rest' },
        done: { label: '終了', short: 'DONE', body: 'phase-done' }
      };

      function clampNumber(input, min, max, fallback) {
        const n = parseInt(input.value, 10);
        if (!Number.isFinite(n)) return fallback;
        return Math.min(max, Math.max(min, n));
      }

      function getSettings() {
        const settings = {
          prepare: clampNumber(els.prepareInput, 0, 600, 10),
          work: clampNumber(els.workInput, 1, 3600, 20),
          rest: clampNumber(els.restInput, 0, 3600, 10),
          sets: clampNumber(els.setsInput, 1, 200, 8)
        };
        for (const [key, value] of Object.entries(settings)) {
          localStorage.setItem('burpee:' + key, String(value));
        }
        return settings;
      }

      function loadSettings() {
        ['prepare','work','rest','sets'].forEach((key) => {
          const saved = localStorage.getItem('burpee:' + key);
          if (saved != null) {
            const id = key === 'sets' ? 'setsInput' : key + 'Input';
            els[id].value = saved;
          }
        });
      }

      function setBodyPhase(phase) {
        document.body.className = phaseMeta[phase].body;
      }

      function setPhase(phase, durationSeconds) {
        state.currentPhase = phase;
        state.currentDurationMs = Math.max(1, durationSeconds * 1000);
        state.remainingMs = state.currentDurationMs;
        setBodyPhase(phase);
        render();
      }

      function nextPhaseName() {
        if (state.currentPhase === 'prepare') return '運動';
        if (state.currentPhase === 'work') {
          return state.setIndex >= state.totalSets ? '終了' : (getSettings().rest > 0 ? '休憩' : '運動');
        }
        if (state.currentPhase === 'rest') return '運動';
        return '-';
      }

      function updateRing() {
        const progress = state.currentDurationMs <= 0 ? 0 :
          Math.max(0, Math.min(1, 1 - (state.remainingMs / state.currentDurationMs)));
        const degrees = Math.round(progress * 360);
        document.documentElement.style.setProperty('--ring', degrees + 'deg');
      }

      function render() {
        const phase = phaseMeta[state.currentPhase];
        const secondsLeft = Math.max(0, Math.ceil(state.remainingMs / 1000));
        els.phaseLabel.textContent = phase.label;
        els.subLabel.textContent = phase.short;
        els.timeDisplay.textContent = String(secondsLeft);
        els.setDisplay.textContent = `${Math.min(state.setIndex, state.totalSets)} / ${state.totalSets}`;
        els.nextDisplay.textContent = nextPhaseName();
        const statusMap = {
          idle: '待機',
          running: '進行中',
          paused: '停止中',
          done: '完了'
        };
        els.statusDisplay.textContent = statusMap[state.status] || '待機';
        els.startBtn.textContent = state.status === 'paused' ? '再開' : (state.status === 'running' ? '進行中' : '開始');
        els.startBtn.disabled = state.status === 'running';
        els.startBtn.style.opacity = state.status === 'running' ? '.7' : '1';
        updateRing();
      }

      function safeVibrate(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
      }

      function ensureAudio() {
        try {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          if (!state.audioContext) state.audioContext = new AudioCtx();
          if (state.audioContext.state === 'suspended') state.audioContext.resume();
          state.audioUnlocked = true;
        } catch (_) {}
      }

      function beep(freq = 880, length = 0.12) {
        if (!state.audioUnlocked || !state.audioContext) return;
        const ctx = state.audioContext;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + length);
        osc.connect(gain).connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + length + 0.02);
      }

      function notifyPhaseChange() {
        if (state.currentPhase === 'work') {
          beep(988, 0.13);
          safeVibrate([90]);
        } else if (state.currentPhase === 'rest') {
          beep(659, 0.12);
          safeVibrate([60]);
        } else if (state.currentPhase === 'done') {
          beep(784, 0.10); setTimeout(() => beep(988, 0.14), 120); setTimeout(() => beep(1175, 0.18), 260);
          safeVibrate([100, 60, 120]);
        } else {
          beep(740, 0.12);
        }
      }

      function clearTimer() {
        if (state.timerId) {
          clearInterval(state.timerId);
          state.timerId = null;
        }
      }

      function finishWorkout() {
        clearTimer();
        state.status = 'done';
        state.currentPhase = 'done';
        state.remainingMs = 0;
        state.currentDurationMs = 1000;
        setBodyPhase('done');
        notifyPhaseChange();
        render();
      }

      function advancePhase() {
        const settings = getSettings();
        if (state.currentPhase === 'prepare') {
          state.setIndex = 1;
          setPhase('work', settings.work);
          notifyPhaseChange();
          return;
        }

        if (state.currentPhase === 'work') {
          if (state.setIndex >= state.totalSets) {
            finishWorkout();
            return;
          }
          if (settings.rest > 0) {
            setPhase('rest', settings.rest);
            notifyPhaseChange();
            return;
          }
          state.setIndex += 1;
          setPhase('work', settings.work);
          notifyPhaseChange();
          return;
        }

        if (state.currentPhase === 'rest') {
          state.setIndex += 1;
          setPhase('work', settings.work);
          notifyPhaseChange();
          return;
        }
      }

      function syncClockTick() {
        const now = Date.now();
        state.remainingMs = Math.max(0, state.endAt - now);
        render();
        if (state.remainingMs <= 0) {
          advancePhase();
          if (state.status === 'running') {
            state.endAt = Date.now() + state.currentDurationMs;
            state.remainingMs = state.currentDurationMs;
          }
        }
      }

      function startInterval() {
        clearTimer();
        state.endAt = Date.now() + state.remainingMs;
        state.timerId = setInterval(syncClockTick, 100);
        syncClockTick();
      }

      function startWorkout() {
        ensureAudio();
        const settings = getSettings();
        state.totalSets = settings.sets;
        state.status = 'running';
        state.setIndex = 0;
        setPhase('prepare', settings.prepare);
        if (settings.prepare === 0) {
          advancePhase();
        }
        startInterval();
      }

      function resumeWorkout() {
        ensureAudio();
        if (state.status !== 'paused') return;
        state.status = 'running';
        startInterval();
      }

      function pauseWorkout() {
        if (state.status !== 'running') return;
        state.remainingMs = Math.max(0, state.endAt - Date.now());
        state.status = 'paused';
        clearTimer();
        render();
      }

      function resetWorkout() {
        clearTimer();
        const settings = getSettings();
        state.status = 'idle';
        state.setIndex = 0;
        state.totalSets = settings.sets;
        setPhase('prepare', settings.prepare || 10);
        state.remainingMs = Math.max(1000, (settings.prepare || 10) * 1000);
        setBodyPhase('prepare');
        render();
      }

      function handleStart() {
        if (state.status === 'paused') {
          resumeWorkout();
          return;
        }
        if (state.status === 'running') return;
        startWorkout();
      }

      function bindPress(button, handler) {
        let touched = false;
        button.addEventListener('touchend', (e) => {
          touched = true;
          e.preventDefault();
          handler();
          setTimeout(() => { touched = false; }, 300);
        }, { passive: false });
        button.addEventListener('click', (e) => {
          if (touched) {
            e.preventDefault();
            return;
          }
          handler();
        });
      }

      function updateInstallHint() {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        if (isStandalone) {
          els.installHint.innerHTML = '<strong>ホーム画面アプリとして起動中。</strong> これでネイティブ風に使える。';
          return;
        }
        if (location.protocol === 'file:') {
          els.installHint.innerHTML = '<strong>いまはローカルファイルとして開いている。</strong> タイマー自体は動くけど、PWAのオフラインキャッシュは使えない。SafariでURLとして開いてから「ホーム画面に追加」してね。';
        }
      }

      function setupServiceWorker() {
        if (!('serviceWorker' in navigator)) {
          els.swStatus.textContent = 'この環境では Service Worker は使えません。';
          return;
        }
        if (!window.isSecureContext) {
          els.swStatus.textContent = 'HTTPS / localhost で配信するとオフライン対応になります。';
          return;
        }
        navigator.serviceWorker.register('./sw.js')
          .then(() => {
            els.swStatus.textContent = 'オフライン対応の準備OK。';
          })
          .catch((err) => {
            els.swStatus.textContent = 'Service Worker登録失敗: ' + err.message;
          });
      }

      loadSettings();
      bindPress(els.startBtn, handleStart);
      bindPress(els.pauseBtn, pauseWorkout);
      bindPress(els.resetBtn, resetWorkout);
      [els.prepareInput, els.workInput, els.restInput, els.setsInput].forEach((el) => {
        el.addEventListener('change', () => {
          if (state.status === 'idle' || state.status === 'done') resetWorkout();
          else getSettings();
        });
      });

      resetWorkout();
      updateInstallHint();
      setupServiceWorker();
      window.addEventListener('pageshow', () => render());
    })();
  </script>
</body>
</html>
